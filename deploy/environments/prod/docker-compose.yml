name: qeet-id-prod

# Simple AWS deployment: EC2 + Docker Compose + AWS RDS (external Postgres).
# Postgres is NOT a service here — DB_URL points to your RDS instance.
# Migrations run automatically on app startup (no separate migrate service).
#
# Start:   docker compose --env-file .env up -d
# Logs:    docker compose logs -f app
# Update:  docker compose pull app && docker compose up -d app
# Stop:    docker compose down

services:

  # ── App (runs migrations on startup, then serves) ─────────────────────────
  app:
    image: qeet-id:latest
    env_file: .env
    networks: [internal, edge]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Redis (rate limiting — ephemeral, no backup needed) ────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", ""]   # disable RDB snapshots
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Caddy (TLS termination — auto Let's Encrypt) ───────────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    networks: [edge]
    restart: unless-stopped

volumes:
  caddydata:
  caddyconfig:

networks:
  internal:   # app ↔ redis (never exposed)
  edge:       # caddy ↔ app  (public-facing)
